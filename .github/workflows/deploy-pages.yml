name: Deploy Frontend to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "index.html"
      - "app.css"
      - "app.js"
      - "app-data.js"
      - "scripts/configure-pages.sh"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure Pages settings through GitHub API
        env:
          PAGES_ADMIN_TOKEN: ${{ secrets.PAGES_ADMIN_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PAGES_CNAME: ${{ vars.PAGES_CNAME }}
        run: ./scripts/configure-pages.sh

      - name: Prepare site artifact
        run: |
          set -euo pipefail
          mkdir -p dist
          cp index.html app.css app.js app-data.js dist/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
